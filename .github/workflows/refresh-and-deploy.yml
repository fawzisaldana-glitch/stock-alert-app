name: refresh-and-deploy
# Runs the data engines on a schedule and publishes the PWA to GitHub Pages — free, always-on.
on:
  # SCHEDULE: uncomment the cron lines below to run automatically twice per weekday.
  # Comment them back out if you're driving refreshes from a VPS/cron instead (avoids conflicts).
  schedule:
    - cron: "0 11 * * 1-5"   # ~6 am ET (weekdays)
    - cron: "0 21 * * 1-5"   # ~4 pm ET (weekdays)
  workflow_dispatch: {}
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Refresh all data feeds
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}          # REQUIRED: "YourApp you@email.com"
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}                 # optional: value gate + Politicians tab
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}  # optional: push top alerts to phone
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}      # optional: your Telegram chat/user id
        run: |
          python macro.py        || echo "macro failed"
          python run.py --notify || echo "alerts failed"          # --notify sends Telegram if token set
          python billionaires.py || echo "billionaires failed"
          python politicians.py  || echo "politicians failed"
          python committee.py    || echo "committee failed"       # CEO + 5-investor board -> Top 5 day/month
          python backtest.py     || echo "backtest failed"        # honest forward + retrospective vs SPY
      - name: Commit refreshed JSON
        run: |
          git config user.name "alerts-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/*.json fund_state/ || true   # fund_state persists picks history → learning + month/forward
          git commit -m "data refresh" || echo "no changes"
          git push || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app                                        # publish the PWA folder
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
