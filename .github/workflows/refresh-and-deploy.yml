name: refresh-and-deploy
# Runs the data engines on a schedule and publishes the PWA to GitHub Pages — free, always-on.
on:
  schedule:
    - cron: "0 11 * * 1-5"   # ~6am ET, weekdays
    - cron: "0 21 * * 1-5"   # ~4pm ET, weekdays
  workflow_dispatch: {}        # manual "Run workflow" button
permissions:
  contents: write
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install -r requirements.txt
      - name: Refresh all data feeds
        env:
          SEC_USER_AGENT: ${{ secrets.SEC_USER_AGENT }}   # REQUIRED secret: "YourApp you@email.com"
          FMP_API_KEY: ${{ secrets.FMP_API_KEY }}          # optional: enables value gate + Politicians tab
        run: |
          python macro.py        || echo "macro failed"
          python run.py          || echo "alerts failed"
          python billionaires.py || echo "billionaires failed"
          python politicians.py  || echo "politicians failed"
      - name: Commit refreshed JSON
        run: |
          git config user.name "alerts-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/*.json || true
          git commit -m "data refresh" || echo "no changes"
          git push || true
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: app                                        # publish the PWA folder
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
