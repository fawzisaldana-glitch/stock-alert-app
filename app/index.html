<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0a0e0d">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,600&family=JetBrains+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<title>Smart Money</title>
<style>
  :root{
    --bg:#0a0e0d; --card:#101714; --line:#1f2b26;
    --txt:#eaf1ed; --dim:#8a9c93; --faint:#56655d;
    --green:#21d6a0; --amber:#f6b23e; --red:#ff5d6c; --accent:#21d6a0;
    --serif:"Fraunces",Georgia,serif; --mono:"JetBrains Mono",ui-monospace,monospace;
    --sans:"IBM Plex Sans",system-ui,sans-serif;
  }
  *{box-sizing:border-box} html,body{margin:0}
  body{background:radial-gradient(1100px 460px at 50% -220px,rgba(33,214,160,.07),transparent 70%),var(--bg);
       color:var(--txt);font-family:var(--sans);font-size:15px;line-height:1.5;
       padding:env(safe-area-inset-top) 0 56px;-webkit-tap-highlight-color:transparent}
  header{position:sticky;top:0;z-index:9;border-bottom:1px solid var(--line);
         background:linear-gradient(var(--bg),rgba(10,14,13,.82));backdrop-filter:blur(10px);padding:15px 18px 0}
  .brand{display:flex;align-items:baseline;gap:10px}
  .brand h1{font-family:var(--serif);font-weight:600;font-size:23px;margin:0}
  .brand .it{font-style:italic;color:var(--accent)}
  .statusmini{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--dim)}
  .statusmini b{font-weight:600}
  .sub{color:var(--faint);font-size:12px;margin:4px 0 0;font-family:var(--mono)}
  .tabs{display:flex;gap:7px;margin-top:13px;overflow-x:auto;scrollbar-width:none;padding-bottom:11px}
  .tabs::-webkit-scrollbar{display:none}
  .tab{flex:0 0 auto;padding:7px 13px;border-radius:9px;color:var(--dim);font-size:13px;font-weight:500;
       cursor:pointer;white-space:nowrap;border:1px solid transparent;transition:.15s}
  .tab.on{color:var(--bg);background:var(--accent);font-weight:600}
  main{padding:16px 14px;display:flex;flex-direction:column;gap:12px}
  .intro{border-left:2px solid var(--accent);padding:1px 0 1px 13px;margin:2px 2px 2px}
  .intro h2{font-family:var(--serif);font-weight:600;font-size:20px;margin:0 0 4px}
  .intro p{margin:0;color:var(--dim);font-size:13px;line-height:1.55}
  .c{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 15px}
  .c.tap{cursor:pointer}
  .c-h{display:flex;align-items:center;gap:10px}
  .tk{font-family:var(--mono);font-weight:600;font-size:17px;letter-spacing:.3px}
  .name{font-family:var(--serif);font-weight:600;font-size:17px;line-height:1.2}
  .pill{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:600;padding:3px 9px;border-radius:8px;
        border:1px solid var(--line);color:var(--dim);white-space:nowrap}
  .pill.g{color:var(--green);border-color:rgba(33,214,160,.32);background:rgba(33,214,160,.08)}
  .pill.a{color:var(--amber);border-color:rgba(246,178,62,.32);background:rgba(246,178,62,.08)}
  .pill.r{color:var(--red);border-color:rgba(255,93,108,.32);background:rgba(255,93,108,.08)}
  .chip{font-size:11px;color:var(--dim);border:1px solid var(--line);border-radius:6px;padding:2px 8px;font-weight:500;white-space:nowrap}
  .fields{display:grid;grid-template-columns:1fr 1fr;gap:11px 14px;margin-top:12px}
  .f{min-width:0}
  .lbl{font-size:9.5px;letter-spacing:.13em;text-transform:uppercase;color:var(--faint);margin-bottom:3px}
  .val{font-family:var(--mono);font-size:14px;color:var(--txt);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .line{margin-top:11px;font-size:13px;color:var(--dim);line-height:1.55}
  .line b{color:var(--txt);font-weight:600}
  .kv{display:flex;justify-content:space-between;gap:12px;padding:7px 0;border-top:1px solid var(--line);font-size:13px}
  .kv:first-of-type{border-top:0}
  .kv .k{color:var(--dim);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .kv .v{font-family:var(--mono);color:var(--txt);white-space:nowrap}
  .hint{font-size:11px;color:var(--faint);margin-top:11px}
  .det{display:none;margin-top:12px;border-top:1px solid var(--line);padding-top:11px}
  .c.open .det{display:block}
  .legend{display:flex;gap:14px;flex-wrap:wrap;font-size:11px;color:var(--dim);margin-top:10px}
  .legend span{display:flex;align-items:center;gap:5px}
  .sw{width:9px;height:9px;border-radius:3px;display:inline-block}
  .empty{color:var(--dim);text-align:center;padding:46px 22px;line-height:1.8}
  a{color:var(--accent)}
  /* "How to read this" explainers (collapsible, beginner-friendly) */
  details.explain{background:var(--card);border:1px solid var(--line);border-radius:12px;margin:2px 0;overflow:hidden}
  details.explain summary{cursor:pointer;list-style:none;padding:11px 14px;color:var(--accent);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
  details.explain summary::-webkit-details-marker{display:none}
  details.explain summary .i{flex:0 0 auto;display:inline-flex;align-items:center;justify-content:center;width:17px;height:17px;border-radius:50%;border:1px solid var(--accent);font-family:var(--serif);font-style:italic;font-size:11px}
  details.explain[open] summary{border-bottom:1px solid var(--line)}
  .ebody{padding:12px 14px;color:var(--dim);font-size:13px;line-height:1.6}
  .ebody b{color:var(--txt);font-weight:600}
  dl.gloss{margin:8px 0 0}
  dl.gloss dt{color:var(--txt);font-weight:600;font-size:12.5px;margin-top:9px}
  dl.gloss dd{margin:2px 0 0;color:var(--dim);font-size:12.5px;line-height:1.55}
  .dotc{display:inline-block;width:9px;height:9px;border-radius:3px;margin-right:5px;vertical-align:middle}
  .dotc.g{background:var(--green)} .dotc.a{background:var(--amber)} .dotc.r{background:var(--red)}
  /* section sub-headers within a tab */
  .sec{display:flex;align-items:center;gap:9px;margin:15px 2px 3px;font-family:var(--serif);font-weight:600;font-size:16px;color:var(--txt)}
  .stag{font-family:var(--mono);font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px;color:var(--dim);border:1px solid var(--line);white-space:nowrap}
  .stag.strong{color:var(--green);border-color:rgba(33,214,160,.32);background:rgba(33,214,160,.08)}
  .stag.exp{color:var(--amber);border-color:rgba(246,178,62,.32);background:rgba(246,178,62,.08)}
  .subnote{color:var(--faint);font-size:12px;margin:0 2px 5px;font-family:var(--mono)}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1>Smart<span class="it"> Money</span></h1>
      <div class="statusmini" id="statusmini"></div>
    </div>
    <div class="sub" id="sub">loading…</div>
    <div class="tabs" id="tabs">
      <div class="tab on" data-view="home">Home</div>
      <div class="tab" data-view="alerts">Alerts</div>
      <div class="tab" data-view="billionaires">Billionaires</div>
      <div class="tab" data-view="politicians">Politicians</div>
      <div class="tab" data-view="macro">Macro</div>
    </div>
  </header>
  <main id="list"></main>
  <script src="app.js"></script>
</body>
</html>
